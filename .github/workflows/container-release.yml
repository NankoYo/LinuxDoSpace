name: Container Release

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      deploy_to_debian:
        description: 'Build image and deploy it to the Debian server'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build And Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-debian:
    name: Deploy To Debian
    needs: build-and-push
    runs-on: ubuntu-latest
    # GitHub Actions does not allow secrets.* in job-level if expressions.
    # We only gate on the manual input here, then validate the required secrets
    # inside the job so the workflow file stays syntactically valid.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_to_debian }}
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate deployment secrets
        shell: bash
        run: |
          missing=0

          for secret_name in \
            DEPLOY_HOST \
            DEPLOY_USER \
            DEPLOY_SSH_PRIVATE_KEY \
            DEPLOY_ENV_FILE
          do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required secret: ${secret_name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare SSH key
        shell: bash
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Prepare deployment env file
        shell: bash
        run: |
          printf '%s\n' "$DEPLOY_ENV_FILE" > deploy/.env

      - name: Check remote deployment prerequisites
        shell: bash
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/linuxdospace}"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "\
            set -euo pipefail && \
            command -v docker >/dev/null && \
            docker compose version >/dev/null && \
            mkdir -p '$DEPLOY_PATH'"

      - name: Upload compose bundle to Debian server
        shell: bash
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/linuxdospace}"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -P "$DEPLOY_PORT" deploy/docker-compose.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml"
          scp -P "$DEPLOY_PORT" deploy/.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"

      - name: Deploy with retry and health checks
        shell: bash
        env:
          TARGET_IMAGE: ghcr.io/${{ github.repository }}:latest
          TARGET_REVISION: ${{ github.sha }}
          MAX_DEPLOY_ATTEMPTS: '10'
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/linuxdospace}"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "\
            DEPLOY_PATH='$DEPLOY_PATH' \
            TARGET_IMAGE='$TARGET_IMAGE' \
            TARGET_REVISION='$TARGET_REVISION' \
            MAX_DEPLOY_ATTEMPTS='$MAX_DEPLOY_ATTEMPTS' \
            bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          # container_health_status 读取当前容器的健康检查状态。
          # 若镜像未定义 Healthcheck，则返回 no-healthcheck，随后退化为检查运行态。
          container_health_status() {
            docker inspect linuxdospace --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' 2>/dev/null || true
          }

          # container_runtime_status 读取当前容器的运行状态，例如 running / exited。
          container_runtime_status() {
            docker inspect linuxdospace --format '{{.State.Status}}' 2>/dev/null || true
          }

          # container_revision 读取当前容器内记录的镜像 revision 标签。
          container_revision() {
            docker inspect linuxdospace --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' 2>/dev/null || true
          }

          # deployment_is_healthy 判断当前部署是否已经达到目标 revision 且容器可用。
          deployment_is_healthy() {
            local current_revision
            local current_health
            local current_status

            current_revision="$(container_revision)"
            current_health="$(container_health_status)"
            current_status="$(container_runtime_status)"

            echo "Current revision: ${current_revision:-<none>}"
            echo "Current health: ${current_health:-<none>}"
            echo "Current status: ${current_status:-<none>}"

            if [ "$current_revision" != "$TARGET_REVISION" ]; then
              return 1
            fi

            if [ "$current_health" = 'healthy' ]; then
              return 0
            fi

            if [ "$current_health" = 'no-healthcheck' ] && [ "$current_status" = 'running' ]; then
              return 0
            fi

            return 1
          }

          # show_diagnostics 输出本轮失败时最重要的运行信息，便于直接在 Actions 日志里定位。
          show_diagnostics() {
            docker ps --filter name=linuxdospace --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}' || true
            docker compose ps || true
            docker logs --tail 80 linuxdospace || true
          }

          for attempt in $(seq 1 "$MAX_DEPLOY_ATTEMPTS"); do
            echo "Deploy attempt ${attempt}/${MAX_DEPLOY_ATTEMPTS}"

            if docker pull "$TARGET_IMAGE" && docker compose up -d; then
              for health_check_round in $(seq 1 12); do
                echo "Health check round ${health_check_round}/12"
                sleep 10

                if deployment_is_healthy; then
                  echo 'Deployment finished successfully.'
                  exit 0
                fi
              done
            else
              echo 'Pull or compose update failed in this attempt.'
            fi

            show_diagnostics

            if [ "$attempt" -lt "$MAX_DEPLOY_ATTEMPTS" ]; then
              echo 'Retrying after 20 seconds...'
              sleep 20
            fi
          done

          echo "Deployment failed after ${MAX_DEPLOY_ATTEMPTS} attempts."
          exit 1
          REMOTE_SCRIPT
