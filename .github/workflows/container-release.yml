name: Container Release

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      deploy_to_debian:
        description: 'Build image and deploy it to the Debian server'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: Verify Repository
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            admin-frontend/package-lock.json

      - name: Verify submodule checkout state
        shell: bash
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          git submodule status --recursive

      - name: Run backend tests
        working-directory: backend
        run: go test ./...

      - name: Build public frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build admin frontend
        working-directory: admin-frontend
        run: |
          npm ci
          npm run build

  build-and-push:
    name: Build And Push Image
    needs: verify
    runs-on: ubuntu-latest
    # Only the default branch refreshes the shared `latest` image. Tag pushes
    # deploy the already-published latest image instead of rebuilding it again.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-debian:
    name: Deploy To Debian
    needs: [verify, build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      packages: read
    concurrency:
      group: linuxdospace-production-deploy
      cancel-in-progress: true
    # Deploy automatically on tag pushes. Keep workflow_dispatch as a manual fallback
    # so the operator can still force a deployment without creating a new tag.
    if: >-
      ${{
        always() &&
        (
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
          (github.event_name == 'workflow_dispatch' && inputs.deploy_to_debian)
        ) &&
        (
          needs.verify.result == 'success' &&
          (
          needs.build-and-push.result == 'success' ||
          needs.build-and-push.result == 'skipped'
          )
        )
      }}
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate deployment secrets
        shell: bash
        run: |
          missing=0

          for secret_name in \
            DEPLOY_HOST \
            DEPLOY_USER \
            DEPLOY_SSH_KNOWN_HOSTS \
            DEPLOY_SSH_PRIVATE_KEY \
            DEPLOY_ENV_FILE
          do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required secret: ${secret_name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Log in to GHCR for deployment
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

      - name: Deploy to Debian with full retries
        shell: bash
        env:
          TARGET_IMAGE_NAME: ghcr.io/moyeranqianzhi/linuxdospace
          TARGET_IMAGE_TAG: latest
          TARGET_IMAGE: ghcr.io/moyeranqianzhi/linuxdospace:latest
          TARGET_REVISION: ${{ github.sha }}
          MAX_DEPLOY_ATTEMPTS: '10'
          MAX_OUTER_DEPLOY_ATTEMPTS: '10'
          DOCKER_PULL_TIMEOUT_SECONDS: '600'
          REMOTE_IMAGE_STREAM_TIMEOUT_SECONDS: '1800'
          COMPOSE_UP_TIMEOUT_SECONDS: '300'
          REMOTE_DEPLOY_POLL_ROUNDS: '40'
          REMOTE_DEPLOY_POLL_INTERVAL_SECONDS: '10'
          REMOTE_DEPLOY_BASENAME: github-actions-deploy-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail

          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/linuxdospace}"
          REMOTE_LOG_FILE="${REMOTE_DEPLOY_BASENAME}.log"
          REMOTE_STATUS_FILE="${REMOTE_DEPLOY_BASENAME}.status"
          REMOTE_PID_FILE="${REMOTE_DEPLOY_BASENAME}.pid"
          SSH_OPTS="-o ServerAliveInterval=15 -o ServerAliveCountMax=6 -o TCPKeepAlive=yes -o ConnectTimeout=20"

          # prepare_ssh_key refreshes the private key and restores the pinned host keys before each outer retry.
          # Keeping SSH bootstrap inside the retry loop makes the whole deploy pipeline self-healing without trusting live keyscan results.
          prepare_ssh_key() {
            install -m 700 -d ~/.ssh
            printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
            chmod 600 ~/.ssh/known_hosts
          }

          # prepare_deployment_env_file rewrites the runtime env file from the current secret payload.
          # Tag-triggered deployments always pull the shared latest image after the build job has refreshed it.
          prepare_deployment_env_file() {
            tmp_env_file="$(mktemp)"

            printf '%s\n' "$DEPLOY_ENV_FILE" > "$tmp_env_file"

            awk \
              -v target_image_name="$TARGET_IMAGE_NAME" \
              -v target_image_tag="$TARGET_IMAGE_TAG" \
              'BEGIN { seen_name = 0; seen_tag = 0 }
              /^IMAGE_NAME=/ {
                if (!seen_name) {
                  print "IMAGE_NAME=" target_image_name
                  seen_name = 1
                }
                next
              }
              /^IMAGE_TAG=/ {
                if (!seen_tag) {
                  print "IMAGE_TAG=" target_image_tag
                  seen_tag = 1
                }
                next
              }
              {
                print
              }
              END {
                if (!seen_name) {
                  print "IMAGE_NAME=" target_image_name
                }
                if (!seen_tag) {
                  print "IMAGE_TAG=" target_image_tag
                }
              }' \
              "$tmp_env_file" > deploy/.env

            rm -f "$tmp_env_file"
          }

          # prepare_remote_deployment_script builds the server-side deploy script for this attempt.
          # The remote script keeps the inner 10 pull and health retries.
          # It always pulls the freshly published target image before compose recreates the service.
          prepare_remote_deployment_script() {
            cat > deploy/remote-deploy.sh <<'REMOTE_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          # This script runs on the Debian server. It trusts only explicit environment
          # variables passed by the GitHub Actions runner at launch time.
          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
          : "${TARGET_IMAGE:?TARGET_IMAGE is required}"
          : "${TARGET_REVISION:?TARGET_REVISION is required}"
          : "${MAX_DEPLOY_ATTEMPTS:?MAX_DEPLOY_ATTEMPTS is required}"
          : "${STATUS_FILE:?STATUS_FILE is required}"
          : "${DOCKER_PULL_TIMEOUT_SECONDS:=600}"
          : "${SKIP_REMOTE_PULL:=false}"
          : "${COMPOSE_UP_TIMEOUT_SECONDS:=300}"
          : "${DEPLOY_LOCK_FILE:=${DEPLOY_PATH}/.remote-deploy.lock}"

          cd "$DEPLOY_PATH"

          # Keep one advisory lock for the whole remote script lifetime so a
          # cancelled workflow cannot leave behind concurrent detached deploys
          # that fight over the same image and compose project.
          exec 9>"$DEPLOY_LOCK_FILE"
          if ! flock -n 9; then
            echo 'Another remote deployment is already running.'
            exit 1
          fi

          # Report the current health state. Containers without a healthcheck return no-healthcheck.
          container_health_status() {
            docker inspect linuxdospace --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' 2>/dev/null || true
          }

          # Report the runtime state so a no-healthcheck container can still be validated as running.
          container_runtime_status() {
            docker inspect linuxdospace --format '{{.State.Status}}' 2>/dev/null || true
          }

          # Read the revision label from the running container to confirm the target image is live.
          container_revision() {
            docker inspect linuxdospace --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' 2>/dev/null || true
          }

          # deployment_is_healthy succeeds only when the expected revision is running and healthy.
          deployment_is_healthy() {
            current_revision="$(container_revision)"
            current_health="$(container_health_status)"
            current_status="$(container_runtime_status)"

            echo "Current revision: ${current_revision}"
            echo "Current health: ${current_health}"
            echo "Current status: ${current_status}"

            if [ "$current_revision" != "$TARGET_REVISION" ]; then
              return 1
            fi

            if [ "$current_health" = 'healthy' ]; then
              return 0
            fi

            if [ "$current_health" = 'no-healthcheck' ] && [ "$current_status" = 'running' ]; then
              return 0
            fi

            return 1
          }

          # deployment_has_terminal_container_failure detects container states
          # that cannot become healthy without another compose recreation.
          # Failing fast here avoids burning the full health-check window when
          # the backend already crashed during startup.
          deployment_has_terminal_container_failure() {
            current_status="$(container_runtime_status)"
            case "$current_status" in
              exited|dead|removing)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          # show_diagnostics prints enough context for the Actions runner to debug a failed attempt.
          show_diagnostics() {
            docker ps --filter name=linuxdospace --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}' || true
            docker compose ps || true
            docker inspect linuxdospace --format '{{json .State}}' 2>/dev/null || true
            docker logs --tail 80 linuxdospace || true
          }

          # Default to failure unless the script explicitly reaches a verified success state.
          echo 'running' > "$STATUS_FILE"
          trap 'echo failure > "$STATUS_FILE"' EXIT

          for attempt in $(seq 1 "$MAX_DEPLOY_ATTEMPTS"); do
            echo "Deploy attempt ${attempt}/${MAX_DEPLOY_ATTEMPTS}"

            if [ "$SKIP_REMOTE_PULL" = 'true' ]; then
              echo 'Using preloaded image from the GitHub runner.'
              deployment_command_result=0
              timeout "$COMPOSE_UP_TIMEOUT_SECONDS" docker compose up -d --force-recreate --remove-orphans || deployment_command_result=$?
            else
              deployment_command_result=0
              timeout "$DOCKER_PULL_TIMEOUT_SECONDS" docker pull "$TARGET_IMAGE" && timeout "$COMPOSE_UP_TIMEOUT_SECONDS" docker compose up -d --force-recreate --remove-orphans || deployment_command_result=$?
            fi

            if [ "$deployment_command_result" -eq 0 ]; then
              for health_check_round in $(seq 1 12); do
                echo "Health check round ${health_check_round}/12"
                sleep 10

                if deployment_is_healthy; then
                  echo 'Deployment finished successfully.'
                  echo 'success' > "$STATUS_FILE"
                  trap - EXIT
                  exit 0
                fi

                if deployment_has_terminal_container_failure; then
                  echo 'Container reached a terminal failed state before becoming healthy.'
                  break
                fi
              done
            else
              echo 'Pull or compose update failed in this attempt.'
            fi

            show_diagnostics

            if [ "$attempt" -lt "$MAX_DEPLOY_ATTEMPTS" ]; then
              echo 'Retrying after 20 seconds...'
              sleep 20
            fi
          done

          echo "Deployment failed after ${MAX_DEPLOY_ATTEMPTS} attempts."
          echo 'failure' > "$STATUS_FILE"
          trap - EXIT
          exit 1
          REMOTE_SCRIPT

            chmod +x deploy/remote-deploy.sh
          }

          # check_remote_deployment_prerequisites verifies SSH connectivity and required binaries.
          # A failure here should be retried just like an upload failure or start failure.
          check_remote_deployment_prerequisites() {
            ssh $SSH_OPTS -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "\
              set -euo pipefail && \
              command -v docker >/dev/null && \
              docker compose version >/dev/null && \
              command -v flock >/dev/null && \
              command -v gzip >/dev/null && \
              command -v setsid >/dev/null && \
              command -v timeout >/dev/null && \
              mkdir -p '$DEPLOY_PATH'"
          }

          # cleanup_remote_deployment_processes kills any detached deploy scripts or lingering docker pulls
          # left behind by previously cancelled workflows. Without this guard, retries can DoS the server by
          # spawning many concurrent pulls for the same image.
          cleanup_remote_deployment_processes() {
            ssh $SSH_OPTS -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "\
              set +e && \
              ps -eo pid=,args= | \
                grep -E 'remote-deploy\.sh|docker pull ghcr\.io/moyeranqianzhi/linuxdospace|docker load' | \
                grep -v grep | \
                while read -r pid _; do kill -9 \"\$pid\" 2>/dev/null || true; done && \
              exit 0"
          }

          # load_target_image_on_remote pulls the already-published latest image on the
          # GitHub runner, then streams it into the Debian host with `docker load`.
          # This avoids depending on the server's flaky outbound GHCR connectivity.
          load_target_image_on_remote() {
            local runner_revision
            local remote_revision

            timeout "$DOCKER_PULL_TIMEOUT_SECONDS" docker pull "$TARGET_IMAGE"

            runner_revision="$(docker image inspect "$TARGET_IMAGE" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')"
            if [ "$runner_revision" != "$TARGET_REVISION" ]; then
              echo "::error::Runner pulled revision ${runner_revision}, expected ${TARGET_REVISION}."
              return 1
            fi

            # Drop the existing remote tag reference before loading the new tar
            # stream so compose cannot accidentally recreate the service from an
            # older locally-tagged `latest` image during a flaky deployment.
            ssh $SSH_OPTS -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "docker image rm -f '$TARGET_IMAGE' >/dev/null 2>&1 || true"

            timeout "$REMOTE_IMAGE_STREAM_TIMEOUT_SECONDS" bash -lc "docker save '$TARGET_IMAGE' | gzip -1 | ssh $SSH_OPTS -p '$DEPLOY_PORT' '$DEPLOY_USER@$DEPLOY_HOST' 'gzip -d | docker load'"

            remote_revision="$(ssh $SSH_OPTS -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "docker image inspect '$TARGET_IMAGE' --format '{{index .Config.Labels \"org.opencontainers.image.revision\"}}'")"
            if [ "$remote_revision" != "$TARGET_REVISION" ]; then
              echo "::error::Remote host loaded revision ${remote_revision}, expected ${TARGET_REVISION}."
              return 1
            fi
          }

          # upload_compose_bundle transfers every file needed by the remote script.
          # This is one of the main flaky network points, so it sits inside the outer retry loop.
          upload_compose_bundle() {
            ssh $SSH_OPTS -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
            scp $SSH_OPTS -P "$DEPLOY_PORT" deploy/docker-compose.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml"
            scp $SSH_OPTS -P "$DEPLOY_PORT" deploy/.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"
            scp $SSH_OPTS -P "$DEPLOY_PORT" deploy/remote-deploy.sh "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/remote-deploy.sh"
          }

          # start_remote_deployment_job launches the remote script in a detached session and validates its PID.
          # Returning a failure here lets the outer retry start the whole deploy pipeline again.
          start_remote_deployment_job() {
            remote_pid="$({
              ssh $SSH_OPTS -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "\
                cd '$DEPLOY_PATH' && \
                rm -f '$REMOTE_LOG_FILE' '$REMOTE_STATUS_FILE' '$REMOTE_PID_FILE' && \
                chmod +x ./remote-deploy.sh && \
                setsid -f env \
                  DEPLOY_PATH='$DEPLOY_PATH' \
                  TARGET_IMAGE='$TARGET_IMAGE' \
                  TARGET_REVISION='$TARGET_REVISION' \
                  MAX_DEPLOY_ATTEMPTS='$MAX_DEPLOY_ATTEMPTS' \
                  STATUS_FILE='$REMOTE_STATUS_FILE' \
                  DOCKER_PULL_TIMEOUT_SECONDS='$DOCKER_PULL_TIMEOUT_SECONDS' \
                  SKIP_REMOTE_PULL='true' \
                  COMPOSE_UP_TIMEOUT_SECONDS='$COMPOSE_UP_TIMEOUT_SECONDS' \
                  bash -lc 'echo \$\$ > '$REMOTE_PID_FILE'; exec ./remote-deploy.sh' \
                  > '$REMOTE_LOG_FILE' 2>&1 < /dev/null && \
                sleep 1 && \
                cat '$REMOTE_PID_FILE' && \
                kill -0 \$(cat '$REMOTE_PID_FILE') 2>/dev/null"
            } | tr -d '\r\n[:space:]')" || return 1

            if ! printf '%s' "$remote_pid" | grep -Eq '^[0-9]+$'; then
              echo '::error::Failed to start detached remote deployment job.'
              return 1
            fi

            echo "Remote deployment PID: ${remote_pid}"
          }

          # wait_for_remote_deployment_result polls the remote status file and streams recent logs.
          # SSH timeouts, explicit failure, detached-process death, or polling timeouts all bubble up to the outer retry loop.
          wait_for_remote_deployment_result() {
            for poll_round in $(seq 1 "$REMOTE_DEPLOY_POLL_ROUNDS"); do
              echo "Poll round ${poll_round}/${REMOTE_DEPLOY_POLL_ROUNDS}"

              remote_status="$({
                ssh $SSH_OPTS -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "\
                  cd '$DEPLOY_PATH' && \
                  remote_status=running && \
                  remote_pid_state=missing && \
                  if [ -f '$REMOTE_STATUS_FILE' ]; then remote_status=\$(cat '$REMOTE_STATUS_FILE'); fi && \
                  if [ -f '$REMOTE_PID_FILE' ]; then \
                    if kill -0 \$(cat '$REMOTE_PID_FILE') 2>/dev/null; then \
                      remote_pid_state=alive; \
                    else \
                      remote_pid_state=dead; \
                    fi; \
                  fi && \
                  printf '%s|%s\n' \"\$remote_status\" \"\$remote_pid_state\""
              } | tr -d '\r')" || return 1

              remote_pid_state="${remote_status#*|}"
              remote_status="${remote_status%%|*}"

              echo "Remote deployment status: ${remote_status}"
              echo "Remote deployment pid state: ${remote_pid_state}"

              ssh $SSH_OPTS -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "\
                cd '$DEPLOY_PATH' && \
                if [ -f '$REMOTE_LOG_FILE' ]; then tail -n 20 '$REMOTE_LOG_FILE'; fi" || true

              if [ "$remote_status" = 'success' ]; then
                echo 'Remote deployment reported success.'
                return 0
              fi

              if [ "$remote_status" = 'failure' ]; then
                echo 'Remote deployment reported failure.'
                return 1
              fi

              if [ "$remote_status" = 'running' ] && [ "$remote_pid_state" = 'dead' ]; then
                echo 'Remote deployment process exited without reporting success.'
                ssh $SSH_OPTS -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "\
                  cd '$DEPLOY_PATH' && \
                  if [ -f '$REMOTE_LOG_FILE' ]; then tail -n 120 '$REMOTE_LOG_FILE'; fi" || true
                return 1
              fi

              sleep "$REMOTE_DEPLOY_POLL_INTERVAL_SECONDS"
            done

            echo 'Timed out while waiting for remote deployment result.'
            ssh $SSH_OPTS -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "\
              cd '$DEPLOY_PATH' && \
              if [ -f '$REMOTE_LOG_FILE' ]; then tail -n 120 '$REMOTE_LOG_FILE'; fi" || true
            return 1
          }

          # run_single_deploy_attempt executes one complete outer attempt from SSH bootstrap to final poll.
          # Together with the inner pull retry loop, the theoretical maximum reaches 10 x 10 attempts.
          run_single_deploy_attempt() {
            prepare_ssh_key
            prepare_deployment_env_file
            prepare_remote_deployment_script
            check_remote_deployment_prerequisites
            cleanup_remote_deployment_processes
            upload_compose_bundle
            load_target_image_on_remote
            start_remote_deployment_job
            wait_for_remote_deployment_result
          }

          for outer_attempt in $(seq 1 "$MAX_OUTER_DEPLOY_ATTEMPTS"); do
            echo "Outer deploy attempt ${outer_attempt}/${MAX_OUTER_DEPLOY_ATTEMPTS}"

            if run_single_deploy_attempt; then
              echo "Deployment finished successfully in outer attempt ${outer_attempt}/${MAX_OUTER_DEPLOY_ATTEMPTS}."
              exit 0
            fi

            echo "Outer deploy attempt ${outer_attempt}/${MAX_OUTER_DEPLOY_ATTEMPTS} failed."

            if [ "$outer_attempt" -lt "$MAX_OUTER_DEPLOY_ATTEMPTS" ]; then
              echo 'Retrying the full deployment pipeline after 20 seconds...'
              sleep 20
            fi
          done

          echo "::error::Deployment failed after ${MAX_OUTER_DEPLOY_ATTEMPTS} outer attempts. Each outer attempt can still perform up to ${MAX_DEPLOY_ATTEMPTS} remote pull retries."
          exit 1
